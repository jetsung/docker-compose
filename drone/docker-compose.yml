# https://github.com/harness/drone
version: '3'

volumes:
  server-data:

services:
  drone-server:
    image: 'drone/drone:2'
    container_name: drone-server
    restart: unless-stopped
    volumes:
      - server-data:/data
    env_file:
      - ./.env
    ports:
      - 80:80
      - 443:443
    
  drone-runner:
    image: 'drone/drone-runner-docker:1'
    container_name: drone-runner
    restart: unless-stopped
    depends_on:
      - drone-server
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock'
    env_file:
      - ./.env


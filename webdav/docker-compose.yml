version: '3'

services:
  webdav:
    image: bytemark/webdav
    container_name: webdav
    restart: unless-stopped      
    ports:
      - "80:80"
    environment:
      TZ: Asia/Shanghai
      AUTH_TYPE: "${AUTH_TYPE}"
      USERNAME: "${USERNAME}"
      PASSWORD: "${PASSWORD}"
    volumes:
      - /srv/webdav:/var/lib/dav

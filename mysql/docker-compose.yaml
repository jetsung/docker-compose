version: "3"
services:
  db:
    image: mariadb:10
    container_name: mysql
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_USER=root
      - TZ=CST-8
    volumes:
      - /opt/mysql/:/var/lib/mysql
      - ./temp:/temp
    network_mode: "host"
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin
    container_name: phpmyadmin
    environment:
      - PMA_ARBITRARY=1
    ports:
      - 8080:80
    restart: unless-stopped
    depends_on:
      - db
    extra_hosts:
      - "database:172.17.0.1"

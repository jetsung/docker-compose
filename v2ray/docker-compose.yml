# https://www.v2fly.org/guide/install.html#docker-%E5%AE%89%E8%A3%85%E6%96%B9%E5%BC%8F
version: '3'
services:
  v2ray:
    image: v2fly/v2fly-core:latest
    container_name: v2ray
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./config.json:/etc/v2ray/config.json
    network_mode: "host"

